services:
  app:
    image: node:latest
    working_dir: /app
    ports:
      - "${PORT:-3010}:3010"
    env_file:
      - ./.env.docker
    volumes:
      - ./:/app
      - ./node_modules:/app/node_modules
    command: sh -c "npm install ; npx prisma generate ; npx prisma migrate deploy ; npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  postgres:
    # pgvector/pgvector:pg16 is the official pgvector-bundled Postgres 16 image.
    # Drop-in replacement for postgres:16 — same data directory layout, adds the
    # `vector` extension required by the RAG knowledge base (lib/ai/rag).
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: edifacts
      POSTGRES_PASSWORD: edifacts
      POSTGRES_DB: edifacts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edifacts -d edifacts"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
      - ./ollama_entrypoint.sh:/entrypoint.sh:ro
    entrypoint: sh /entrypoint.sh
    command: []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:

